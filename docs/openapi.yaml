openapi: 3.1.0
info:
  title: Wiki REST API
  version: "1.0.0"
  description: >
    Wiki システム用 REST API。
    ページ管理、アセット管理、ページロック（TTL/トークン）を提供する。
    認証方式として Basic 認証および Bearer 認証を受け付ける。
    Bearer 認証成功時にスライディング期限延長が発生した場合は、
    `X-Bearer-Expire` ヘッダで更新後の有効期限を返す。

servers:
  - url: /api

security:
  - basicAuth: []
  - bearerAuth: []

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque

  parameters:
    PageId:
      name: page_id
      in: path
      required: true
      schema: { type: string }

    AssetId:
      name: asset_id
      in: path
      required: true
      schema: { type: string }

    LockAuthHeader:
      name: X-Lock-Authentication
      in: header
      required: true
      schema: { type: string }
      description: 'token={lock_token}'

  schemas:
    ErrorResponse:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          description: 人間可読なエラー理由

    IdResponse:
      type: object
      required: [id]
      properties:
        id: { type: string }

    PagePath:
      type: object
      required: [path]
      properties:
        path: { type: string }

    LockInfo:
      type: object
      properties:
        expire:
          type: string
          format: date-time
        username:
          type: string

    AssetMeta:
      type: object
      properties:
        file_name: { type: string }
        mime_type: { type: string }
        size: { type: number }
        timestamp: { type: string }
        username: { type: string }

  responses:
    Unauthorized:
      description: 認証に失敗した
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Forbidden:
      description: 認証済みだが必要スコープまたは操作条件を満たさない
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }

paths:
  /pages:
    post:
      summary: ページの作成
      description: Bearer 認証時は `write` スコープが必要
      x-required-scope: [write]
      parameters:
        - name: path
          in: query
          required: true
          schema: { type: string }
      responses:
        "201":
          description: 作成成功
          headers:
            Location: { schema: { type: string } }
            ETag: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IdResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          description: パス不正
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: 既存ページあり
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /pages/{page_id}/source:
    get:
      summary: ページソース取得
      description: Bearer 認証時は `read` スコープが必要
      x-required-scope: [read]
      parameters:
        - $ref: "#/components/parameters/PageId"
        - name: rev
          in: query
          schema: { type: number }
      responses:
        "200":
          description: Markdown ソース
          headers:
            Cache-Control: { schema: { type: string } }
            ETag: { schema: { type: string } }
          content:
            text/markdown:
              schema: { type: string }
        "304":
          description: Not Modified
          headers:
            Cache-Control: { schema: { type: string } }
            ETag: { schema: { type: string } }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          description: rev 不正
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: ページ/リビジョン不存在
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "410":
          description: 削除済み
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

    put:
      summary: ページソース更新
      description: Bearer 認証時は `write` スコープが必要。ロックされているページでは `X-Lock-Authentication` も必要
      x-required-scope: [write]
      parameters:
        - $ref: "#/components/parameters/PageId"
        - name: amend
          in: query
          schema: { type: boolean }
        - $ref: "#/components/parameters/LockAuthHeader"
      requestBody:
        required: true
        content:
          text/markdown:
            schema: { type: string }
      responses:
        "204":
          description: 更新成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          description: amend 不正
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "403":
          description: 権限/トークン不正
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: ページ不存在
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "410":
          description: 削除済み
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "423":
          description: ロック中（トークン未指定）
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /pages/{page_id}/meta:
    get:
      summary: ページメタ情報取得
      description: Bearer 認証時は `read` スコープが必要
      x-required-scope: [read]
      parameters:
        - $ref: "#/components/parameters/PageId"
        - name: rev
          in: query
          schema: { type: number }
      responses:
        "200":
          description: メタ情報
          headers:
            Cache-Control: { schema: { type: string } }
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          description: rev 不正
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: ページ/リビジョン不存在
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "410":
          description: 削除済み
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /pages/{page_id}/path:
    get:
      summary: ページパス取得
      description: Bearer 認証時は `read` スコープが必要
      x-required-scope: [read]
      parameters:
        - $ref: "#/components/parameters/PageId"
      responses:
        "200":
          description: ページパス
          headers:
            Cache-Control: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PagePath" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: ページ不存在
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    post:
      summary: ページパス更新
      description: rename_to または restore_to のいずれかを指定する。Bearer 認証時は `write` スコープが必要
      x-required-scope: [write]
      parameters:
        - $ref: "#/components/parameters/PageId"
        - name: rename_to
          in: query
          required: false
          schema: { type: string }
        - name: restore_to
          in: query
          required: false
          schema: { type: string }
        - name: recursive
          in: query
          required: false
          schema: { type: boolean }
      responses:
        "204":
          description: リネーム成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          description: パス不正
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: ページ不存在
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: パス競合
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "410":
          description: 削除済み
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "423":
          description: ロック中
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /pages/{page_id}/assets:
    get:
      summary: ページ配下アセット一覧
      description: Bearer 認証時は `read` スコープが必要
      x-required-scope: [read]
      parameters:
        - $ref: "#/components/parameters/PageId"
      responses:
        "200":
          description: アセット一覧
          headers:
            Cache-Control: { schema: { type: string } }
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AssetMeta" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: ページ不存在
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /pages/{page_id}/assets/{file_name}:
    post:
      summary: アセットアップロード（ページ指定）
      description: Bearer 認証時は `write` スコープが必要。ロックされているページでは `X-Lock-Authentication` も必要
      x-required-scope: [write]
      parameters:
        - $ref: "#/components/parameters/PageId"
        - name: file_name
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "201":
          description: アップロード成功
          headers:
            Location: { schema: { type: string } }
            ETag: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IdResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          description: パラメータ不正
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: ページ不存在
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: ファイル重複
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "410":
          description: 削除済みページ
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

    get:
      summary: アセット取得リダイレクト（ページ指定）
      description: Bearer 認証時は `read` スコープが必要
      x-required-scope: [read]
      parameters:
        - $ref: "#/components/parameters/PageId"
        - name: file_name
          in: path
          required: true
          schema: { type: string }
      responses:
        "302":
          description: リダイレクト
          headers:
            Location: { schema: { type: string } }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          description: パラメータ不正
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: ページ/アセット不存在
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "410":
          description: 削除済み
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /pages/{page_id}/lock:
    post:
      summary: ページロック取得
      description: Bearer 認証時は `write` スコープが必要
      x-required-scope: [write]
      parameters:
        - $ref: "#/components/parameters/PageId"
      responses:
        "204":
          description: ロック成功
          headers:
            X-Page-Lock: { schema: { type: string } }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: ページ不存在
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: 既にロック中
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "410":
          description: 削除済み
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

    put:
      summary: ページロック延長
      description: Bearer 認証時は `write` スコープが必要。`X-Lock-Authentication` が必要
      x-required-scope: [write]
      parameters:
        - $ref: "#/components/parameters/PageId"
        - $ref: "#/components/parameters/LockAuthHeader"
      responses:
        "204":
          description: 延長成功
          headers:
            X-Page-Lock: { schema: { type: string } }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: トークン不正
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: ロックなし/ページ不存在
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "410":
          description: 削除済み
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

    get:
      summary: ロック状態取得
      description: Bearer 認証時は `read` スコープが必要
      x-required-scope: [read]
      parameters:
        - $ref: "#/components/parameters/PageId"
      responses:
        "200":
          description: ロック情報
          headers:
            Cache-Control: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LockInfo" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: ロックなし/ページ不存在
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "410":
          description: 削除済み
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

    delete:
      summary: ページロック解除
      description: Bearer 認証時は `write` スコープが必要。`X-Lock-Authentication` が必要
      x-required-scope: [write]
      parameters:
        - $ref: "#/components/parameters/PageId"
        - $ref: "#/components/parameters/LockAuthHeader"
      responses:
        "204":
          description: 解除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: トークン不正
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: ロックなし/ページ不存在
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "410":
          description: 削除済み
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /pages/{page_id}:
    delete:
      summary: ページ削除
      description: Bearer 認証時は `write` スコープが必要。ロックされているページでは `X-Lock-Authentication` も必要
      x-required-scope: [write]
      parameters:
        - $ref: "#/components/parameters/PageId"
        - $ref: "#/components/parameters/LockAuthHeader"
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: トークン不正
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: ページ不存在
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "410":
          description: 既に削除済み
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "423":
          description: ロック中（トークン未指定）
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /assets:
    post:
      summary: アセットアップロード（パス指定）
      description: Bearer 認証時は `write` スコープが必要。ロックされているページでは `X-Lock-Authentication` も必要
      x-required-scope: [write]
      parameters:
        - name: path
          in: query
          required: true
          schema: { type: string }
        - name: file
          in: query
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "201":
          description: アップロード成功
          headers:
            Location: { schema: { type: string } }
            ETag: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IdResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          description: パラメータ不正
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: ページ不存在
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: ファイル重複
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "410":
          description: 削除済みページ
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

    get:
      summary: アセット取得リダイレクト（パス指定）
      description: Bearer 認証時は `read` スコープが必要
      x-required-scope: [read]
      parameters:
        - name: path
          in: query
          required: true
          schema: { type: string }
        - name: file
          in: query
          required: true
          schema: { type: string }
      responses:
        "302":
          description: リダイレクト
          headers:
            Location: { schema: { type: string } }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          description: パラメータ不正
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: ページ/アセット不存在
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "410":
          description: 削除済み
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /assets/{asset_id}/data:
    get:
      summary: アセット本体取得
      description: Bearer 認証時は `read` スコープが必要
      x-required-scope: [read]
      parameters:
        - $ref: "#/components/parameters/AssetId"
      responses:
        "200":
          description: バイナリデータ
          headers:
            Content-Disposition: { schema: { type: string } }
            Cache-Control: { schema: { type: string } }
            ETag: { schema: { type: string } }
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "304":
          description: Not Modified
          headers:
            Cache-Control: { schema: { type: string } }
            ETag: { schema: { type: string } }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: アセット不存在
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "410":
          description: 削除済み
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /assets/{asset_id}/meta:
    get:
      summary: アセットメタ取得
      description: Bearer 認証時は `read` スコープが必要
      x-required-scope: [read]
      parameters:
        - $ref: "#/components/parameters/AssetId"
      responses:
        "200":
          description: メタ情報
          headers:
            Cache-Control: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AssetMeta" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: アセット不存在
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "410":
          description: 削除済み
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /assets/{asset_id}:
    delete:
      summary: アセット削除
      description: Bearer 認証時は `write` スコープが必要。ロック対象ページ配下では `X-Lock-Authentication` も必要
      x-required-scope: [write]
      parameters:
        - $ref: "#/components/parameters/AssetId"
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: アセット不存在
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "410":
          description: 削除済み
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /users/me:
    get:
      summary: 自分自身のユーザ情報取得
      description: Basic 認証または Bearer 認証で利用できる。Bearer 認証時は `read` スコープが必要
      x-required-scope: [read]
      responses:
        "200":
          description: ユーザ情報
          headers:
            Cache-Control: { schema: { type: string } }
          content:
            application/json:
              schema:
                type: object
                required: [id, username, display_name, timestamp]
                properties:
                  id: { type: string }
                  username: { type: string }
                  display_name: { type: string }
                  timestamp: { type: string }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
